name: Release

# Triggered when you push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`).
# Builds the app, signs the release if signing secrets are configured, and publishes a
# GitHub Release with the APK/AAB attached for direct download.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # Optional: only runs when you've added the signing secrets to the repo.
      - name: Decode signing keystore (if configured)
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          {
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"

      - name: Build release AAB/APK + debug APK
        run: gradle :app:bundleRelease :app:assembleRelease :app:assembleDebug --no-daemon --stacktrace

      - name: Collect & brand artifacts
        run: |
          VER="${GITHUB_REF_NAME}"
          mkdir -p dist
          rel=$(ls app/build/outputs/apk/release/*.apk 2>/dev/null | head -1)
          [ -n "$rel" ] && cp "$rel" "dist/PearlKeyboard-${VER}.apk"
          aab=$(ls app/build/outputs/bundle/release/*.aab 2>/dev/null | head -1)
          [ -n "$aab" ] && cp "$aab" "dist/PearlKeyboard-${VER}.aab"
          dbg=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          [ -n "$dbg" ] && cp "$dbg" "dist/PearlKeyboard-${VER}-debug.apk"
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            Pearl Keyboard **${{ github.ref_name }}**.

            ### Downloads
            - **`PearlKeyboard-${{ github.ref_name }}.apk`** — the keyboard. **Install this.** It's a signed release build, so the in-app updater can update it in place on future releases.
            - `PearlKeyboard-${{ github.ref_name }}.aab` — Android App Bundle (Google Play).
            - `PearlKeyboard-${{ github.ref_name }}-debug.apk` — developer build (separate app id `….debug`).

            ### Install
            1. Download **`PearlKeyboard-${{ github.ref_name }}.apk`**.
            2. Allow "Install unknown apps" for your browser/file manager and open it.
            3. Launch **Pearl Keyboard**, tap **Enable in Settings**, then **Choose Keyboard**.

            > Coming from an older **debug** build (`…​.debug`)? Uninstall it first, then install this release APK once — after that, updates apply automatically.
